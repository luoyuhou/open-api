name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Generate Prisma Client
        run: npx prisma generate

      # 打包构建产物
      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -r prisma deploy/
          cd deploy && tar -czf ../deploy.tar.gz .
      # 上传到服务器
      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/tmp"
          overwrite: true


      # 在服务器上解压并重启服务
      - name: Extract and restart service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/home/apps/open-api
            BACKUP_DIR=/home/apps/open-api.backup.$(date +%Y%m%d_%H%M%S)

            # 🔑 备份环境变量文件
            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" /tmp/open-api.env.backup
              echo "✅ Backed up .env file"
            fi

            # 📦 备份数据库文件
            if [ -f "$APP_DIR/prisma/prod.db" ]; then
              cp "$APP_DIR/prisma/prod.db" /tmp/open-api-prod.db.backup
              echo "✅ Backed up prod.db file"
            fi

            # 停止服务，避免 SQLite 写入锁阻塞 migration
            pm2 stop open-api 2>/dev/null || true
            echo "⏸️ Service stopped"

            # 备份旧版本
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "$BACKUP_DIR"
            fi

            # 解压新版本
            mkdir -p "$APP_DIR"
            tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"

            # 🔑 恢复环境变量文件
            if [ -f /tmp/open-api.env.backup ]; then
              cp /tmp/open-api.env.backup "$APP_DIR/.env"
              rm /tmp/open-api.env.backup
              echo "✅ Restored .env file"
            else
              echo "⚠️ No .env backup found, please create it manually"
            fi

            # 📦 恢复数据库文件
            if [ -f /tmp/open-api-prod.db.backup ]; then
              mkdir -p "$APP_DIR/prisma"
              cp /tmp/open-api-prod.db.backup "$APP_DIR/prisma/prod.db"
              rm /tmp/open-api-prod.db.backup
              echo "✅ Restored prod.db file"
            else
              echo "⚠️ No prod.db backup found (this is normal for first deployment)"
            fi

            # 🗄️ 同步 schema 到 SQLite（单文件 init + db push，无需新增 migration 文件夹）
            cd "$APP_DIR"
            set -a && source .env && set +a

            PROD_DB="$APP_DIR/prisma/prod.db"

            run_schema_sync() {
              echo "📂 Database: ${PROD_DB}"
              echo "🔗 DATABASE_URL: ${DATABASE_URL}"

              echo "📦 Generating Prisma Client..."
              npx prisma generate

              if [ ! -f "$PROD_DB" ]; then
                echo "🆕 Fresh database, applying init migration..."
                npx prisma migrate deploy
              else
                echo "🗄️ Syncing schema via db push..."
                npx prisma db push --skip-generate
              fi

              echo "🔍 Verifying database matches schema.prisma..."
              if ! npx prisma migrate diff \
                --from-url "$DATABASE_URL" \
                --to-schema-datamodel prisma/schema.prisma \
                --exit-code; then
                echo "❌ Schema drift detected"
                npx prisma migrate diff \
                  --from-url "$DATABASE_URL" \
                  --to-schema-datamodel prisma/schema.prisma \
                  --script || true
                return 1
              fi

              echo "✅ Schema sync completed"
            }

            if ! run_schema_sync; then
              echo "❌ Database schema sync failed, rolling back..."
              pm2 stop open-api 2>/dev/null || true
              rm -rf "$APP_DIR"
              mv "$BACKUP_DIR" "$APP_DIR"
              pm2 restart open-api || pm2 start "$APP_DIR/dist/src/main.js" --name open-api
              exit 1
            fi

            # 重启服务 (使用 PM2)
            pm2 restart open-api || pm2 start dist/src/main.js --name open-api
            echo "✅ Service restarted"

            # 清理临时文件
            rm /tmp/deploy.tar.gz

            # 只保留最近3个备份
            cd /home/apps && ls -t | grep open-api.backup | tail -n +4 | xargs -r rm -rf
            echo "✅ Cleanup completed"
      # 健康检查
      - name: Health check
        run: |
          sleep 10
          curl --fail https://${{ secrets.SERVER_HOST }}/api || exit 1
